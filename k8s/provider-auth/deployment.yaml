apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: provider-auth
  template:
    metadata:
      labels:
        app: provider-auth
    spec:
      hostAliases:
      - ip: "10.43.0.100"
        hostnames:
        - "hub1.test.v2.chip-in.net"
      volumes:
      - name: certs
        secret:
          secretName: provider-auth-certs
      - name: spnagent-trustca
        configMap:
          name: spnagent-trustca-config
      - name: auth-config
        secret:
          secretName: provider-auth-secret

      containers:
      - name: spn-auth
        image: ghcr.io/srfeo3/rudoidc:latest
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - name: auth-config
          mountPath: /conf/config.yaml
          subPath: config.yaml

      - name: spn-provider
        image: ghcr.io/chip-in-v2/spnagent/provider:latest
        env:
        - name: SPN_HUB_HOSTNAME
          value: "hub1.test.v2.chip-in.net"
        - name: SPN_HUB_PORT
          value: "4433"
        - name: FORWARD_ADDRESS
          value: "127.0.0.1:8082"
        - name: SPN_AGENT_TRUST_CERTIFICATE_ROOT
          value: "/etc/ssl/workers/ca-certificates/ca.pem"
        - name: SPN_AGENT_CLIENT_CERTIFICATE
          value: "/etc/ssl/workers/client-certs/client.pem"
        - name: SPN_AGENT_CLIENT_CERTIFICATE_KEY
          value: "/etc/ssl/workers/client-certs/client-key.pem"
        - name: RUST_LOG
          value: "info"
        volumeMounts:
        - name: spnagent-trustca
          mountPath: /etc/ssl/workers/ca-certificates/ca.pem
          subPath: ca.pem
        - name: certs
          mountPath: /etc/ssl/workers/client-certs/client.pem
          subPath: client.pem
        - name: certs
          mountPath: /etc/ssl/workers/client-certs/client-key.pem
          subPath: client-key.pem
          readOnly: true
