# SPN Hub Deployment
# External Resource Requirements:
# 1. Service [spn-inventory-service]: Required for hub registration and metadata lookup (Port 3000).
# 2. Network: UDP Port 4433 must be exposed to allow inbound SPN tunnel connections.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spn-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spn-hub
  template:
    metadata:
      labels:
        app: spn-hub
    spec:
      containers:
      - name: spnhub
        image: ghcr.io/srfeo3/spnhub:latest
        ports:
        - name: hub-udp
          containerPort: 4433
          protocol: UDP
        env:
        - name: SPNHUB_INVENTORY_URL
          value: "http://spn-inventory-service:3000/v1"
        - name: RUST_LOG
          value: "info"
---
apiVersion: v1
kind: Service
metadata:
  name: spn-hub-service
spec:
  type: LoadBalancer
  clusterIP: 10.43.0.100
  selector:
    app: spn-hub
  ports:
    - name: hub-udp
      port: 4433
      targetPort: 4433
      protocol: UDP