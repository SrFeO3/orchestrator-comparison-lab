# ArgoCD Application for SPN Gateway Service
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spn-gw
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/SrFeO3/orchestrator-comparison-lab.git
    targetRevision: HEAD
    path: k8s/spngw
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
